<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Radio en Vivo</title>
</head>
<body>
    <h1>Reproductor de Radio en Vivo</h1>
    <audio id="audioPlayer" controls></audio>

    <script>
        const liveStreamURL = "https://c26.radioboss.fm:8581/stream";
        const localFile = "AEROSUR1.mp3";
        const audioPlayer = document.getElementById('audioPlayer');

        let isLive = true;
        let retryDelay = 5000;
        let connectionCheckInterval = null;

        function playLiveStream() {
            console.log("Reproduciendo la transmisión en vivo...");
            audioPlayer.src = liveStreamURL;
            audioPlayer.load();
            audioPlayer.play().catch(error => {
                console.error("Error al reproducir la transmisión en vivo:", error);
                switchToOfflineMode();
            });
        }

        function playLocalFile() {
            console.log("Reproduciendo archivo local...");
            audioPlayer.src = localFile;
            audioPlayer.load();
            audioPlayer.play().catch(error => {
                console.error("Error al reproducir archivo local:", error);
            });
        }

        function switchToOfflineMode() {
            console.log("Cambiando a modo offline...");
            isLive = false;
            playLocalFile();
            clearInterval(connectionCheckInterval);
            connectionCheckInterval = setInterval(checkConnection, 5000);
        }

        function checkConnection() {
            console.log("Verificando conexión...");
            fetch(liveStreamURL, { method: 'HEAD' }).then(() => {
                console.log("Conexión restablecida.");
                if (!isLive) {
                    console.log("Vuelta a la transmisión en vivo...");
                    isLive = true;
                    playLiveStream();
                }
            }).catch(() => {
                console.log("No se pudo establecer conexión con la transmisión en vivo.");
            });
        }

        // Iniciar la transmisión en vivo
        playLiveStream();
        connectionCheckInterval = setInterval(checkConnection, 5000);

        // Eventos de manejo de errores y fin de reproducción
        audioPlayer.addEventListener('error', () => {
            console.error("Error de reproducción detectado.");
            if (isLive) {
                switchToOfflineMode();
            }
        });

        audioPlayer.addEventListener('ended', () => {
            console.log("Fin de la reproducción actual.");
            if (isLive) {
                switchToOfflineMode();
            }
        });

        // Manejar cambio de estado de conexión
        window.addEventListener('online', () => {
            console.log("Conexión a internet restablecida.");
            if (!isLive) {
                isLive = true;
                playLiveStream();
                clearInterval(connectionCheckInterval);
                connectionCheckInterval = setInterval(checkConnection, 5000);
            }
        });

        window.addEventListener('offline', () => {
            console.log("Conexión a internet perdida.");
            if (isLive) {
                switchToOfflineMode();
            }
        });
    </script>
</body>
</html>
