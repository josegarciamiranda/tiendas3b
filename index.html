<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Audio</title>
</head>
<body>
    <audio id="audioPlayer" controls autoplay>
        <source id="audioSource" src="https://c26.radioboss.fm:8581/stream" type="audio/mp3">
        Tu navegador no soporta la reproducción de audio.
    </audio>
    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const audioSource = document.getElementById('audioSource');
        const streamUrl = "https://c26.radioboss.fm:8581/stream";
        const localFile = "AEROSUR1.mp3";
        let isPlayingLocalFile = false;

        function checkStream() {
            fetch(streamUrl, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        if (isPlayingLocalFile) {
                            audioSource.src = streamUrl;
                            audioPlayer.load();
                            audioPlayer.play();
                            isPlayingLocalFile = false;
                        }
                    } else {
                        throw new Error('Stream not available');
                    }
                })
                .catch(error => {
                    if (!isPlayingLocalFile) {
                        audioSource.src = localFile;
                        audioPlayer.load();
                        audioPlayer.play();
                        isPlayingLocalFile = true;
                    }
                });
        }

        // Check stream availability every 10 seconds
        setInterval(checkStream, 10000);

        // Initial check
        checkStream();
    </script>
</body>
</html>
