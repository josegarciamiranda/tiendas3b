<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Audio</title>
</head>
<body>
    <audio id="audioPlayer" controls>
        Tu navegador no soporta el elemento de audio.
    </audio>

    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const streamURL = 'https://c26.radioboss.fm:8581/stream';
        const localURL = 'https://josegarciamiranda.github.io/tiendas3b/AEROSUR.mp3';
        let isPlayingLocal = false;

        const checkInternet = async () => {
            try {
                const response = await fetch(streamURL, { method: 'HEAD' });
                if (response.ok) {
                    console.log('Internet disponible, reproduciendo transmisión en vivo.');
                    switchToStream();
                } else {
                    console.log('Internet no disponible, cambiando a archivo local.');
                    switchToLocalFile();
                }
            } catch (error) {
                console.log('Error en la verificación de Internet, cambiando a archivo local.');
                switchToLocalFile();
            }
        };

        const switchToStream = () => {
            if (isPlayingLocal) {
                console.log('Cambiando a la transmisión en vivo.');
                audioPlayer.pause();
                audioPlayer.src = streamURL;
                audioPlayer.play().then(() => {
                    console.log('Transmisión en vivo reproducida.');
                    isPlayingLocal = false;
                }).catch(error => {
                    console.log('Error al reproducir la transmisión en vivo: ', error);
                });
            }
        };

        const switchToLocalFile = () => {
            if (!isPlayingLocal) {
                console.log('Cambiando al archivo local.');
                audioPlayer.pause();
                audioPlayer.src = localURL;
                audioPlayer.play().then(() => {
                    console.log('Archivo local reproducido.');
                    isPlayingLocal = true;
                }).catch(error => {
                    console.log('Error al reproducir el archivo local: ', error);
                });
            }
        };

        // Inicializa con el stream en vivo y revisa la conexión cada 10 segundos
        window.addEventListener('load', () => {
            console.log('Página cargada, reproduciendo transmisión en vivo.');
            audioPlayer.src = streamURL;
            audioPlayer.play().then(() => {
                console.log('Transmisión en vivo reproducida.');
            }).catch(error => {
                console.log('Error al iniciar la transmisión en vivo: ', error);
            });
            checkInternet();
            setInterval(checkInternet, 10000);
        });

        // Si hay un error en la reproducción, intenta cambiar al archivo local
        audioPlayer.addEventListener('error', () => {
            if (!isPlayingLocal) {
                console.log('Error en la reproducción de la transmisión, cambiando al archivo local.');
                switchToLocalFile();
            }
        });
    </script>
</body>
</html>
