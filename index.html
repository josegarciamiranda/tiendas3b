<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Audio</title>
</head>
<body>
    <audio id="streamPlayer" controls autoplay>
        <source src="https://c26.radioboss.fm:8581/stream" type="audio/mpeg">
        Tu navegador no soporta el elemento de audio.
    </audio>
    <audio id="localPlayer" controls style="display:none;">
        <source src="https://tu-nombre-de-usuario.github.io/tu-repositorio/AEROSUR.mp3" type="audio/mpeg">
        Tu navegador no soporta el elemento de audio.
    </audio>

    <script>
        const streamPlayer = document.getElementById('streamPlayer');
        const localPlayer = document.getElementById('localPlayer');

        const checkInternet = () => {
            fetch('https://c26.radioboss.fm:8581/stream', { method: 'HEAD' })
                .then((response) => {
                    if (response.ok) {
                        // Conexión a internet está activa
                        if (localPlayer.style.display !== 'none') {
                            localPlayer.pause();
                            localPlayer.style.display = 'none';
                            streamPlayer.style.display = 'block';
                            streamPlayer.play().catch(error => {
                                console.log('Autoplay error: ', error);
                            });
                        }
                    } else {
                        // Sin conexión a internet o stream no disponible
                        switchToLocalFile();
                    }
                })
                .catch(() => {
                    // Sin conexión a internet
                    switchToLocalFile();
                });
        };

        const switchToLocalFile = () => {
            if (streamPlayer.style.display !== 'none') {
                streamPlayer.pause();
                streamPlayer.style.display = 'none';
                localPlayer.style.display = 'block';
                localPlayer.play().catch(error => {
                    console.log('Autoplay error: ', error);
                });
            }
        };

        // Revisa la conexión a internet cada 10 segundos
        setInterval(checkInternet, 10000);

        // Inicialmente revisa la conexión al cargar la página y reproduce el audio
        window.addEventListener('load', () => {
            checkInternet();
            streamPlayer.play().catch(error => {
                console.log('Autoplay error: ', error);
            });
        });
    </script>
</body>
</html>
