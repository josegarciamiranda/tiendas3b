<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream with Fallback</title>
</head>
<body style="
    display: flex;
    justify-content: center;
    align-items: center;
    margin: auto 0;
    margin-top: 20%;
">
    <audio id="audioPlayer" controls>
        Your browser does not support the audio element.
    </audio>
    <script>
        const liveStreamURL = 'https://s48.radiolize.com/radio/8050/radio.mp3'; // Replace with your live stream URL
        const fallbackMP3 = '/AEROSUR1.mp3'; // Replace with your fallback MP3 file path

        const audioPlayer = document.getElementById('audioPlayer');
        let isConnected = navigator.onLine;

        function checkConnection() {
            fetch(liveStreamURL, { method: 'HEAD' })
                .then((response) => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    if (!isConnected) {
                        isConnected = true;
                        playLiveStream();
                    }
                })
                .catch(() => {
                    if (isConnected) {
                        isConnected = false;
                        playFallback();
                    }
                });
        }

        function playLiveStream() {
            audioPlayer.src = liveStreamURL;
            audioPlayer.play().catch((err) => {
                console.error('Failed to play live stream:', err);
            });
        }

        function playFallback() {
            audioPlayer.src = fallbackMP3;
            audioPlayer.play().catch((err) => {
                console.error('Failed to play fallback MP3:', err);
            });
        }

        window.addEventListener('online', () => {
            isConnected = true;
            playLiveStream();
        });

        window.addEventListener('offline', () => {
            isConnected = false;
            playFallback();
        });

        audioPlayer.addEventListener('error', () => {
            if (isConnected) {
                isConnected = false;
                playFallback();
            }
        });

        playLiveStream();
        setInterval(checkConnection, 5000); // Check connection every 5 seconds
    </script>
</body>
</html>
