<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor de Audio</title>
</head>
<body>

<audio id="audioPlayer" controls autoplay>
  <source src="https://c26.radioboss.fm:8581/stream" type="audio/mpeg">
  <!-- Fallback file local en caso de pérdida de conexión -->
  <source src="AEROSUR1.mp3" type="audio/mpeg">
  Tu navegador no soporta el elemento de audio.
</audio>

<script>
  var audio = document.getElementById('audioPlayer');
  var radioStream = 'https://c26.radioboss.fm:8581/stream';
  var localFile = 'AEROSUR1.mp3';
  
  // Verificar estado de la conexión
  setInterval(function() {
    var online = navigator.onLine;
    if (!online && audio.src === radioStream) {
      // Cambiar a archivo local si la conexión se pierde
      audio.src = localFile;
      audio.play();
    } else if (online && audio.src === localFile) {
      // Volver a la URL de la radio si la conexión se restablece
      audio.src = radioStream;
      audio.play();
    }
  }, 3000); // Comprobar cada 3 segundos

</script>

</body>
</html>
