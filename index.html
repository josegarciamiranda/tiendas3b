<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Audio</title>
</head>
<body>
    <audio id="audioPlayer" controls>
        Tu navegador no soporta el elemento de audio.
    </audio>

    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const streamURL = 'https://c26.radioboss.fm:8581/stream';
        const localURL = 'https://tu-nombre-de-usuario.github.io/tu-repositorio/AEROSUR.mp3';
        let isPlayingLocal = false;

        const checkInternet = async () => {
            try {
                const response = await fetch(streamURL, { method: 'HEAD' });
                if (response.ok) {
                    if (isPlayingLocal) {
                        switchToStream();
                    }
                } else {
                    switchToLocalFile();
                }
            } catch (error) {
                switchToLocalFile();
            }
        };

        const switchToStream = () => {
            audioPlayer.pause();
            audioPlayer.src = streamURL;
            audioPlayer.play().catch(error => {
                console.log('Autoplay error: ', error);
            });
            isPlayingLocal = false;
        };

        const switchToLocalFile = () => {
            audioPlayer.pause();
            audioPlayer.src = localURL;
            audioPlayer.play().catch(error => {
                console.log('Autoplay error: ', error);
            });
            isPlayingLocal = true;
        };

        // Revisa la conexión a internet cada 10 segundos
        setInterval(checkInternet, 10000);

        // Inicialmente revisa la conexión al cargar la página y reproduce el audio
        window.addEventListener('load', () => {
            audioPlayer.src = streamURL;
            audioPlayer.play().catch(error => {
                console.log('Autoplay error: ', error);
            });
            checkInternet();
        });

        // Asegura que el audio se pausa antes de cambiar la fuente
        audioPlayer.addEventListener('error', (event) => {
            if (!isPlayingLocal) {
                switchToLocalFile();
            }
        });
    </script>
</body>
</html>
