<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Audio</title>
</head>
<body>
    <audio id="audioPlayer" controls autoplay>
        Tu navegador no soporta la reproducción de audio.
    </audio>
    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const streamUrl = "https://c26.radioboss.fm:8581/stream";
        const localFile = "AEROSUR1.mp3";
        let isPlayingLocalFile = false;

        async function checkStream() {
            try {
                const response = await fetch(streamUrl, { method: 'HEAD' });
                if (response.ok) {
                    if (isPlayingLocalFile) {
                        audioPlayer.src = streamUrl;
                        audioPlayer.load();
                        audioPlayer.play();
                        isPlayingLocalFile = false;
                    }
                } else {
                    throw new Error('Stream not available');
                }
            } catch (error) {
                if (!isPlayingLocalFile) {
                    audioPlayer.src = localFile;
                    audioPlayer.load();
                    audioPlayer.play();
                    isPlayingLocalFile = true;
                }
            }
        }

        audioPlayer.addEventListener('error', () => {
            if (!isPlayingLocalFile) {
                audioPlayer.src = localFile;
                audioPlayer.load();
                audioPlayer.play();
                isPlayingLocalFile = true;
            }
        });

        audioPlayer.addEventListener('ended', () => {
            if (isPlayingLocalFile) {
                audioPlayer.play(); // Reiniciar la reproducción del archivo local.
            } else {
                checkStream(); // Verificar si la transmisión en vivo está disponible.
            }
        });

        // Verificar la disponibilidad del stream cada 10 segundos
        setInterval(checkStream, 10000);

        // Verificación inicial
        checkStream();
    </script>
</body>
</html>
