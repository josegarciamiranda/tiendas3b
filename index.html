<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Audio</title>
</head>
<body>
    <audio id="audioPlayer" controls>
        Tu navegador no soporta el elemento de audio.
    </audio>

    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const streamURL = 'https://c26.radioboss.fm:8581/stream';
        const localURL = 'https://josegarciamiranda.github.io/tiendas3b/AEROSUR.mp3';
        let isPlayingLocal = false;

        const checkInternet = async () => {
            try {
                const response = await fetch(streamURL, { method: 'HEAD' });
                if (response.ok && isPlayingLocal) {
                    switchToStream();
                } else if (!response.ok) {
                    switchToLocalFile();
                }
            } catch (error) {
                switchToLocalFile();
            }
        };

        const switchToStream = () => {
            if (isPlayingLocal) {
                audioPlayer.pause();
                audioPlayer.src = streamURL;
                audioPlayer.play().then(() => {
                    console.log('Switched to stream.');
                }).catch(error => {
                    console.log('Autoplay error: ', error);
                });
                isPlayingLocal = false;
            }
        };

        const switchToLocalFile = () => {
            if (!isPlayingLocal) {
                audioPlayer.pause();
                audioPlayer.src = localURL;
                audioPlayer.play().then(() => {
                    console.log('Switched to local file.');
                }).catch(error => {
                    console.log('Autoplay error: ', error);
                });
                isPlayingLocal = true;
            }
        };

        // Inicializa con el stream en vivo y revisa la conexión cada 10 segundos
        window.addEventListener('load', () => {
            audioPlayer.src = streamURL;
            audioPlayer.play().then(() => {
                console.log('Playing stream.');
            }).catch(error => {
                console.log('Autoplay error: ', error);
            });
            checkInternet();
            setInterval(checkInternet, 10000);
        });

        // Si hay un error en la reproducción, intenta cambiar al archivo local
        audioPlayer.addEventListener('error', () => {
            if (!isPlayingLocal) {
                switchToLocalFile();
            }
        });
    </script>
</body>
</html>
