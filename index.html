<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Radio en Vivo</title>
</head>
<body>
    <h1>Reproductor de Radio en Vivo</h1>
    <audio id="audioPlayer" controls></audio>

    <script>
        const liveStreamURL = "https://c26.radioboss.fm:8581/stream";
        const localFile = "AEROSUR1.mp3";
        const audioPlayer = document.getElementById('audioPlayer');
        
        let isLive = true;

        function loadLiveStream() {
            audioPlayer.src = liveStreamURL;
            audioPlayer.play().catch(() => {
                console.log("Error al reproducir la transmisión en vivo, intentando archivo local.");
                loadBackup();
            });
        }

        function loadBackup() {
            isLive = false;
            audioPlayer.src = localFile;
            audioPlayer.play().catch((error) => {
                console.error("Error al reproducir el archivo local:", error);
            });
        }

        audioPlayer.addEventListener('error', () => {
            if (isLive) {
                console.log("Error al reproducir la transmisión en vivo, cambiando al archivo local.");
                loadBackup();
            }
        });

        audioPlayer.addEventListener('ended', () => {
            if (!isLive) {
                console.log("Archivo local finalizado, intentando nuevamente la transmisión en vivo.");
                loadLiveStream();
            }
        });

        function checkConnection() {
            fetch(liveStreamURL, { method: 'HEAD', mode: 'no-cors' }).then(() => {
                if (!isLive) {
                    console.log("Conexión restablecida, cambiando a la transmisión en vivo.");
                    isLive = true;
                    loadLiveStream();
                }
            }).catch(() => {
                console.log("No se pudo establecer conexión con la transmisión en vivo.");
                if (isLive) {
                    loadBackup();
                }
            });
        }

        setInterval(checkConnection, 5000);

        loadLiveStream();
    </script>
</body>
</html>
