<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Radio en Vivo</title>
</head>
<body>
    <h1>Reproductor de Radio en Vivo</h1>
    <audio id="audioPlayer" controls></audio>

    <script>
        const liveStreamURL = "https://c26.radioboss.fm:8581/stream";
        const localFile = "AEROSUR1.mp3";
        const audioPlayer = document.getElementById('audioPlayer');

        let isLive = true;
        let retryDelay = 5000;
        let retryTimer;

        function playAudio(source) {
            audioPlayer.src = source;
            audioPlayer.load();
            audioPlayer.play().catch(error => {
                console.error("Error al intentar reproducir:", error);
                handlePlaybackError();
            });
        }

        function handlePlaybackError() {
            if (isLive) {
                console.log("Fallo en la transmisión en vivo, cambiando al archivo local.");
                isLive = false;
                playAudio(localFile);
            } else {
                console.log("Fallo en la reproducción del archivo local, reintentando en " + (retryDelay / 1000) + " segundos.");
                clearTimeout(retryTimer);
                retryTimer = setTimeout(() => playAudio(localFile), retryDelay);
                retryDelay = Math.min(retryDelay * 2, 60000); // Incrementar el retraso hasta un máximo de 60 segundos
            }
        }

        function checkConnection() {
            fetch(liveStreamURL, { method: 'HEAD', mode: 'no-cors' }).then(() => {
                if (!isLive) {
                    console.log("Conexión restablecida, cambiando a la transmisión en vivo.");
                    isLive = true;
                    retryDelay = 5000; // Resetear el retraso de reintento
                    playAudio(liveStreamURL);
                }
            }).catch(() => {
                console.log("No se pudo establecer conexión con la transmisión en vivo.");
                if (isLive) {
                    handlePlaybackError();
                }
            });
        }

        audioPlayer.addEventListener('error', handlePlaybackError);

        audioPlayer.addEventListener('ended', () => {
            if (isLive) {
                handlePlaybackError();
            } else {
                console.log("Archivo local finalizado, reintentando transmisión en vivo.");
                clearTimeout(retryTimer);
                retryTimer = setTimeout(() => playAudio(localFile), retryDelay);
                retryDelay = Math.min(retryDelay * 2, 60000); // Incrementar el retraso hasta un máximo de 60 segundos
            }
        });

        window.addEventListener('online', () => {
            console.log("Conexión a internet restablecida.");
            if (!isLive) {
                isLive = true;
                retryDelay = 5000; // Resetear el retraso de reintento
                playAudio(liveStreamURL);
            }
        });

        window.addEventListener('offline', () => {
            console.log("Conexión a internet perdida.");
            if (isLive) {
                handlePlaybackError();
            }
        });

        // Iniciar la transmisión en vivo
        playAudio(liveStreamURL);
        setInterval(checkConnection, 5000);
    </script>
</body>
</html>
