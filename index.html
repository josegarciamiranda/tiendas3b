<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor de audio</title>
</head>
<body>
<audio id="audioPlayer" controls autoplay>
  <source id="remoteSource" src="https://c26.radioboss.fm:8581/stream" type="audio/mpeg">
  <source id="localSource" src="AEROSUR1.mp3" type="audio/mpeg">
  Tu navegador no soporta audio HTML5.
</audio>

<script>
var audio = document.getElementById('audioPlayer');
var remoteSource = document.getElementById('remoteSource');
var localSource = document.getElementById('localSource');
var isRemotePlaying = true;

// Monitorear cambios de estado del audio para manejar reconexión
audio.addEventListener('error', function() {
  console.error('Error al cargar el audio.');

  if (isRemotePlaying) {
    isRemotePlaying = false;
    audio.src = 'AEROSUR1.mp3'; // Cambiar a la fuente local
    audio.load();
    audio.play();
    console.log('Reproduciendo archivo local.');
  }
});

// Intentar reconectar a la URL remota cada 30 segundos
setInterval(function() {
  if (!isRemotePlaying) {
    console.log('Intentando reconectar al audio remoto...');
    isRemotePlaying = true;
    audio.src = remoteSource.src;
    audio.load();
    audio.play();
    console.log('Reconectado al audio remoto.');
  }
}, 30000); // 30 segundos

</script>
</body>
</html>
