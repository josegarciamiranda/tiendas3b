<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Live Stream with Fallback</title>
	</head>
	<body style="
    display: flex;
    justify-content: center;
    align-items: center;
    margin: auto 0;
    margin-top: 20%;
">
		<audio id="audioPlayer" controls="" src="https://s48.radiolize.com/radio/8050/radio.mp3"></audio>
		<script>
			const liveStreamURL = 'https://s48.radiolize.com/radio/8050/radio.mp3'; // Replace with your live stream URL
			const fallbackMP3 = '/AEROSUR1.mp3'; // Replace with your fallback MP3 file path

			const audioPlayer = document.getElementById('audioPlayer');
			let isConnected = true;

			function checkConnection() {
				fetch(liveStreamURL, { method: 'HEAD' })
					.then((response) => {
						if (!response.ok) throw new Error('Network response was not ok');
						if (!isConnected) {
							isConnected = true;
							playLiveStream();
						}
					})
					.catch(() => {
						if (isConnected) {
							isConnected = false;
							playFallback();
						}
					});
			}

			function playLiveStream() {
				audioPlayer.src = liveStreamURL;
				audioPlayer.play().catch((err) => {
					console.error('Failed to play live stream:', err);
				});
			}

			function playFallback() {
				audioPlayer.src = fallbackMP3;
				audioPlayer.play().catch((err) => {
					console.error('Failed to play fallback MP3:', err);
				});
			}

			audioPlayer.addEventListener('error', () => {
				if (isConnected) {
					isConnected = false;
					playFallback();
				}
			});

			playLiveStream();
			setInterval(checkConnection, 5000); // Check connection every 5 seconds
		</script>
	<!-- Code injected by live-server -->
<script>
	// <![CDATA[  <-- For SVG support
	if ('WebSocket' in window) {
		(function () {
			function refreshCSS() {
				var sheets = [].slice.call(document.getElementsByTagName("link"));
				var head = document.getElementsByTagName("head")[0];
				for (var i = 0; i < sheets.length; ++i) {
					var elem = sheets[i];
					var parent = elem.parentElement || head;
					parent.removeChild(elem);
					var rel = elem.rel;
					if (elem.href && typeof rel != "string" || rel.length == 0 || rel.toLowerCase() == "stylesheet") {
						var url = elem.href.replace(/(&|\?)_cacheOverride=\d+/, '');
						elem.href = url + (url.indexOf('?') >= 0 ? '&' : '?') + '_cacheOverride=' + (new Date().valueOf());
					}
					parent.appendChild(elem);
				}
			}
			var protocol = window.location.protocol === 'http:' ? 'ws://' : 'wss://';
			var address = protocol + window.location.host + window.location.pathname + '/ws';
			var socket = new WebSocket(address);
			socket.onmessage = function (msg) {
				if (msg.data == 'reload') window.location.reload();
				else if (msg.data == 'refreshcss') refreshCSS();
			};
			if (sessionStorage && !sessionStorage.getItem('IsThisFirstTime_Log_From_LiveServer')) {
				console.log('Live reload enabled.');
				sessionStorage.setItem('IsThisFirstTime_Log_From_LiveServer', true);
			}
		})();
	}
	else {
		console.error('Upgrade your browser. This Browser is NOT supported WebSocket for Live-Reloading.');
	}
	// ]]>
</script>


</body>
</html>
