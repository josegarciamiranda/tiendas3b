<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Audio</title>
</head>
<body>
    <audio id="audioPlayer" controls>
        Tu navegador no soporta el elemento de audio.
    </audio>

    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const streamURL = 'https://c26.radioboss.fm:8581/stream';
        const localURL = './AEROSUR.mp3';  // Ajusta la ruta según la ubicación real del archivo en tu repositorio
        let isPlayingLocal = false;

        const checkInternet = async () => {
            try {
                const response = await fetch(streamURL, { method: 'HEAD' });
                if (response.ok) {
                    console.log('Transmisión en vivo disponible.');
                    if (!audioPlayer.paused && audioPlayer.src === streamURL) {
                        console.log('El audio ya está reproduciendo la transmisión en vivo.');
                    } else {
                        switchToStream();
                    }
                } else {
                    console.log('Transmisión en vivo no disponible, cambiando a archivo local.');
                    switchToLocalFile();
                }
            } catch (error) {
                console.log('Error al verificar la conexión, cambiando a archivo local.');
                switchToLocalFile();
            }
        };

        const switchToStream = () => {
            console.log('Cambiando a la transmisión en vivo.');
            audioPlayer.pause();
            audioPlayer.src = streamURL;
            audioPlayer.load();
            audioPlayer.play().then(() => {
                console.log('Transmisión en vivo reproducida.');
                isPlayingLocal = false;
            }).catch(error => {
                console.log('Error al reproducir la transmisión en vivo:', error);
            });
        };

        const switchToLocalFile = () => {
            console.log('Cambiando al archivo local.');
            audioPlayer.pause();
            audioPlayer.src = localURL;
            audioPlayer.load();
            audioPlayer.play().then(() => {
                console.log('Archivo local reproducido.');
                isPlayingLocal = true;
            }).catch(error => {
                console.log('Error al reproducir el archivo local:', error);
            });
        };

        // Función para manejar cambios en la conexión cada 10 segundos
        setInterval(checkInternet, 10000);

        // Inicialización al cargar la página
        window.addEventListener('load', () => {
            console.log('Página cargada, verificando conexión inicial.');
            checkInternet();
        });

        // Evento de error en la reproducción, intentar cambiar al archivo local si no está reproduciendo localmente
        audioPlayer.addEventListener('error', () => {
            if (!isPlayingLocal) {
                console.log('Error en la reproducción de la transmisión, cambiando al archivo local.');
                switchToLocalFile();
            }
        });

        // Evento de pausa, intentar volver a conectar la transmisión en vivo si está reproduciendo localmente
        audioPlayer.addEventListener('pause', () => {
            if (isPlayingLocal) {
                console.log('Audio en pausa, intentando volver a conectar la transmisión en vivo.');
                switchToStream();
            }
        });

        // Evitar la pausa automática del reproductor al cambiar la fuente de audio
        audioPlayer.addEventListener('timeupdate', () => {
            if (audioPlayer.paused && audioPlayer.currentTime > 0 && audioPlayer.src === streamURL) {
                console.log('Reiniciando la transmisión en vivo.');
                audioPlayer.play();
            }
        });
    </script>
</body>
</html>
