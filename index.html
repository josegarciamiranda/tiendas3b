<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor de Audio</title>
</head>
<body>

<audio id="audioPlayer" controls autoplay onerror="onAudioError()">
  <source id="radioSource" src="https://c26.radioboss.fm:8581/stream" type="audio/mpeg">
  <source id="localSource" src="AEROSUR1.mp3" type="audio/mpeg">
  Tu navegador no soporta el elemento de audio.
</audio>

<script>
  var audio = document.getElementById('audioPlayer');
  var radioSource = document.getElementById('radioSource');
  var localSource = document.getElementById('localSource');
  var isOnline = true; // Estado inicial de la conexión

  // Función para cambiar la fuente de audio
  function switchSource(source) {
    audio.pause(); // Pausar la reproducción actual
    audio.currentTime = 0; // Reiniciar la reproducción desde el principio
    audio.removeChild(audio.firstChild); // Limpiar la fuente actual
    audio.appendChild(source.cloneNode()); // Agregar nueva fuente
    audio.load(); // Cargar la nueva fuente
    audio.play(); // Iniciar reproducción
  }

  // Función para manejar el evento de error de audio
  function onAudioError() {
    if (audio.error && audio.error.code === MediaError.MEDIA_ERR_NETWORK) {
      // Cambiar a archivo local si hay un error de red
      switchSource(localSource);
    }
  }

  // Verificar estado de la conexión
  function checkConnection() {
    var online = navigator.onLine;
    if (!online && isOnline) {
      // Cambiar a archivo local si la conexión se pierde
      isOnline = false;
      switchSource(localSource);
    } else if (online && !isOnline) {
      // Volver a la URL de la radio si la conexión se restablece y estaba reproduciendo local
      if (audio.currentSrc === localSource.src) {
        isOnline = true;
        switchSource(radioSource);
      }
    }
  }

  // Verificar la conexión inicialmente
  checkConnection();

  // Verificar la conexión cada 3 segundos
  setInterval(checkConnection, 3000);

</script>

</body>
</html>
